  const label=a.format==='Carousel'?'Open carousel':'Open video';
  const thumb=a.permalink?`<a class="thumb-link" href="${a.permalink}" target="_blank" rel="noopener">${img}<span class="play-ov"><span class="pc">▶</span>${label}</span></a>`:img;
  const mets=[['Impressions','impr',v=>fmt(v)],['Reach','reach',v=>fmt(v)],['Frequency','freq',v=>v.toFixed(2)],['Amount Spent','spend',v=>RM(v)],['Link Clicks','link_clicks',v=>fmt(v)],['Link CTR','ctr',v=>pct(v)],['Hook Rate','hook',v=>pct(v)],['Hold Rate','hold',v=>pct(v)],['ThruPlays','thru',v=>fmt(v)],['Landing Page Views','lpv',v=>fmt(v)],['Purchases','purch',v=>fmt(v)],['Purchase Value','pval',v=>RM(v)],['ROAS','roas',v=>v.toFixed(2)+'x'],['Outbound CTR','octr',v=>pct(v)]].map(f=>`<div class="met"><div class="v">${f[2](a[f[1]]||0)}</div><div class="k">${f[0]}</div></div>`).join('');
  const eng=`<div style="display:flex;gap:14px;margin-top:10px;font-size:12.5px;color:var(--muted)">👍 <b style="color:var(--ink)">${fmt(a.react)}</b> 💬 <b style="color:var(--ink)">${fmt(a.comm)}</b> ↗ <b style="color:var(--ink)">${fmt(a.share)}</b> · Post eng. <b style="color:var(--ink)">${fmt(a.peng)}</b></div>`;
  const dest=a.dest?`<div style="margin-top:10px;font-size:12px">Destination: <a href="${a.dest}" target="_blank">${a.dest.replace(/^https?:\/\//,'')}</a></div>`:'';
  document.getElementById('modalTitle').textContent=short(a.ad_name);
  document.getElementById('modalBody').innerHTML=`<div class="mthumb"><span class="fmt-tag">${a.format}</span>${thumb}</div><div><div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px"><span class="chip2">${a.objective}</span><span class="chip2">${a.category}</span><span class="badge ${a.status}">${a.status}</span></div><div style="font-size:12px;color:var(--muted);margin-bottom:12px;line-height:1.6">Campaign: <b style="color:var(--ink)">${a.campaign}</b><br>Ad set: <b style="color:var(--ink)">${a.adset}</b> · ${a.format}${a.status==='inactive'&&a.stopped?`<br><span style="color:#b91c1c;font-weight:700">Stopped ${dfmt(a.stopped)}</span>`:''}</div><div class="mmetrics">${mets}</div>${eng}${dest}<div style="margin-top:12px;font-size:11px;color:#9aa0bf">Metrics for selected period: ${dfmt(STATE.from)} – ${dfmt(STATE.to)}</div></div>`;
  document.getElementById('modal').classList.add('on');};
function renderAll(){killCharts();renderNav();renderControls();
  VIEWS.forEach(v=>document.getElementById('v-'+v[0]).classList.toggle('on',v[0]===STATE.view));
  if(STATE.view==='overview')renderOverview();else if(STATE.view==='campaigns')renderCampaigns();else if(STATE.view==='placements')renderPlacements();else if(STATE.view==='audience')renderAudience();else if(STATE.view==='creatives')renderCreatives();}
renderAll();
</script></body></html>
